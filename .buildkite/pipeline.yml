steps:
  # Julia versions
  - group: ":julia: Julia"
    key: "julia"
    steps:
      - label: "Julia {{matrix.julia}}"
        plugins:
          - JuliaCI/julia#v1:
              version: "{{matrix.julia}}"
          - JuliaCI/julia-test#v1:
              test_args: "--quickfail --all --verbose"
          - JuliaCI/julia-coverage#v1:
              codecov: true
              dirs:
                - src
                - lib
        agents:
          queue: "metal"
        if: |
          build.message =~ /\[only tests\]/ ||
          build.message =~ /\[only julia\]/ ||
          build.message !~ /\[only/ &&
            build.message !~ /\[skip tests\]/ &&
            build.message !~ /\[skip julia\]/
        timeout_in_minutes: 60
        matrix:
          setup:
            julia:
              - "1.10"
              - "1.11"
              - "1.12"
              - "1.13"

  - group: ":soon: Pre-releases"
    steps:
      - label: "Julia pre-release {{matrix.julia}}"
        plugins:
          - JuliaCI/julia#v1:
              version: "{{matrix.julia}}"
          - JuliaCI/julia-test#v1:
              test_args: "--quickfail --all --verbose"
          - JuliaCI/julia-coverage#v1:
              codecov: true
              dirs:
                - src
                - lib
        agents:
          queue: "metal"
        if: |
          build.message =~ /\[only tests\]/ ||
          build.message =~ /\[only pre\]/ ||
          build.message !~ /\[only/ &&
            build.message !~ /\[skip tests\]/ &&
            build.message !~ /\[skip pre\]/
        timeout_in_minutes: 30
        soft_fail: true
        matrix:
          setup:
            julia:
              - "nightly"

  # special tests
  - group: ":eyes: Special"
    depends_on: "julia"
    steps:
      - label: ":floppy_disk: Shared Storage"
        plugins:
          - JuliaCI/julia#v1:
              version: "1.12"
          - JuliaCI/julia-test#v1:
              test_args: "--quickfail --all --verbose"
        agents:
          queue: "metal"
        if: |
          build.message =~ /\[only tests\]/ ||
          build.message =~ /\[only special\]/ ||
          build.message !~ /\[only/ && !build.pull_request.draft &&
            build.message !~ /\[skip tests\]/ &&
            build.message !~ /\[skip special\]/
        timeout_in_minutes: 60
        commands: |
          echo -e "[Metal]\ndefault_storage = \"shared\"" >LocalPreferences.toml
      - label: ":mag: API validation"
        plugins:
          - JuliaCI/julia#v1:
              version: "1.12"
          - JuliaCI/julia-test#v1:
              test_args: "--jobs=1 --quickfail --verbose"
          - JuliaCI/julia-coverage#v1:
              codecov: true
              dirs:
                - src
                - lib
        env:
          MTL_DEBUG_LAYER: "1"
          MTL_SHADER_VALIDATION: "1"
        commands: |
          # blocking synchronization is easier to validate
          echo -e "[Metal]\nnonblocking_synchronization = false" >LocalPreferences.toml
        agents:
          queue: "metal"
        if: |
          build.message =~ /\[only tests\]/ ||
          build.message =~ /\[only validation\]/ ||
          build.message =~ /\[only special\]/ ||
          build.message !~ /\[only/ && !build.pull_request.draft &&
            build.message !~ /\[skip tests\]/ &&
            build.message !~ /\[skip validation\]/ &&
            build.message !~ /\[skip special\]/
        timeout_in_minutes: 60
      # - label: ":ram: Large buffers"
      #   plugins:
      #     - JuliaCI/julia#v1:
      #         version: "1.12"
      #     - JuliaCI/julia-test#v1:
      #         test_args: "--jobs=1 --quickfail --verbose large"
      #     - JuliaCI/julia-coverage#v1:
      #         codecov: true
      #         dirs:
      #           - src
      #           - lib
      #   env:
      #     MTL_DEBUG_LAYER: '1'
      #     MTL_SHADER_VALIDATION: '1'
      #   agents:
      #     queue: "metal"
      #   if: |
      #     build.message =~ /\[only tests\]/ ||
      #     build.message =~ /\[only large\]/ ||
      #     build.message =~ /\[only special\]/ ||
      #     build.message !~ /\[only/ && !build.pull_request.draft &&
      #       build.message !~ /\[skip tests\]/ &&
      #       build.message !~ /\[skip large\]/ &&
      #       build.message !~ /\[skip special\]/
      #   timeout_in_minutes: 15

  - label: ":books: Documentation"
    depends_on: "julia"
    plugins:
      - JuliaCI/julia#v1:
          version: "1.12"
    command: |
      julia --project -e '
        println("--- :julia: Instantiating project")
        using Pkg
        Pkg.instantiate()
        Pkg.activate("docs")
        Pkg.instantiate()
        push!(LOAD_PATH, @__DIR__)

        println("+++ :julia: Building documentation")
        include("docs/make.jl")'
    agents:
      queue: "metal"
    if: |
      build.message =~ /\[only docs\]/ ||
      build.message !~ /\[only/ && !build.pull_request.draft &&
        build.message !~ /\[skip docs\]/
    timeout_in_minutes: 30

  - wait: ~
    continue_on_failure: true

  - label: ":racehorse: Benchmarks"
    key: benchmarks
    plugins:
      - JuliaCI/julia#v1:
          version: "1.12"
    command: |
      julia --project=perf -e '
        using Pkg

        println("--- :julia: Instantiating project")
        Pkg.develop([PackageSpec(path=pwd())])

        println("+++ :julia: Benchmarking")
        include("perf/runbenchmarks.jl")'
    artifact_paths:
      - "benchmarkresults.json"
    agents:
      queue: "metal"
    if: |
      build.message =~ /\[only benchmarks\]/ ||
      build.message !~ /\[only/ && !build.pull_request.draft &&
        build.message !~ /\[skip benchmarks\]/
    timeout_in_minutes: 30

  - label: ":github: Publish benchmarks"
    key: publish-benchmarks
    depends_on: benchmarks
    command: |
      if ! buildkite-agent artifact download benchmarkresults.json .; then
        echo "No benchmark result found; skipping GitHub dispatch"
        exit 0
      fi
      if [ -z "$${GITHUB_TOKEN:-}" ]; then
        echo "GITHUB_TOKEN is not available"
        exit 1
      fi

      payload=$$(jq -cn \
        --arg build_number "$$BUILDKITE_BUILD_NUMBER" \
        --arg commit "$$BUILDKITE_COMMIT" \
        --arg branch "$$BUILDKITE_BRANCH" \
        --arg pull_request "$$BUILDKITE_PULL_REQUEST" \
        '{event_type: "benchmarks_complete", client_payload: $$ARGS.named}')
      curl --fail --silent --show-error --request POST \
        --header "Authorization: Bearer $$GITHUB_TOKEN" \
        --header "Accept: application/vnd.github+json" \
        --url "https://api.github.com/repos/JuliaGPU/Metal.jl/dispatches" \
        --data "$$payload"
    agents:
      queue: "metal"

