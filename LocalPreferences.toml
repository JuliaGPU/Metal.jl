[Metal]
# which storage mode unspecified allocations should default to.
# possible values: "private", "shared", "managed"
#default_storage = "private"

# whether to use a nonblocking synchronization mechanism,
# making it possible to do use cooperative multitasking.
#nonblocking_synchronization = true

# whether to label Metal resources and command buffers.
# defaults to true when running Julia with -g2, and false otherwise.
#label_resources = true

# whether to batch command-buffers, to amortize launch overhead
#command_batching = true
#
# tunables (which can also be set using environment variables):
# - maximum number of operations to batch into one command buffer before
#   committing. lower values reduce latency-to-first-result and the memory held by
#   in-flight work; higher values improve throughput. defaults to 32.
#command_batching_ops = 32
# - maximum amount of blit traffic (in bytes) to batch before committing, bounding
#   the memory pinned by an open batch. defaults to 67108864 (64 MiB).
#command_batching_bytes = 67108864
# - maximum number of committed-but-incomplete command buffers kept in flight;
#   further submissions block until the GPU drains one. defaults to 3.
#command_batching_inflight = 3
